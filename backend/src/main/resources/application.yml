spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/carpool_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

# JWT – за production задайте JWT_SECRET и JWT_EXPIRY_HOURS чрез env
app:
  jwt:
    secret: ${JWT_SECRET:c3ByaW5nLWNhcnBvb2wtand0LXNlY3JldC1rZXktMTIzNDU2}
    expiry-hours: ${JWT_EXPIRY_HOURS:24}

