spring:
  config:
    import: optional:classpath:application-local.yml
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/carpool_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

# JWT – за production задайте JWT_SECRET и JWT_EXPIRY_HOURS чрез env
app:
  jwt:
    secret: ${JWT_SECRET:c3ByaW5nLWNhcnBvb2wtand0LXNlY3JldC1rZXktMTIzNDU2}
    expiry-hours: ${JWT_EXPIRY_HOURS:24}
  # Допълнителни CORS pattern-и (запетая), напр. тунел към Vite – виж docs/ТЕСТ_ПРЕЗ_ТУНЕЛ.md
  cors:
    extra-origin-patterns: ${APP_CORS_EXTRA_ORIGIN_PATTERNS:}
  payment:
    stripe:
      # secret-key и webhook-secret: само в application-local.yml (локално)
      # или env STRIPE_SECRET_KEY / STRIPE_WEBHOOK_SECRET (не ги задавайте празни в IDE!)
      currency: ${STRIPE_CURRENCY:eur}
      success-url: ${STRIPE_SUCCESS_URL:http://localhost:5173/payment-success}
      cancel-url: ${STRIPE_CANCEL_URL:http://localhost:5173/payment-cancel}
      # Точни origin-и на фронтенда през HTTPS тунел (запетая), напр. https://abc.ngrok-free.app
      extra-frontend-origins: ${STRIPE_EXTRA_FRONTEND_ORIGINS:}

